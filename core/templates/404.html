{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta charset="UTF-8">

    <title>Página não encontrada</title>

    <link rel="stylesheet" href="{% static 'css/errors.css' %}">

</head>
<body>

<div class="error-container">

    <div class="error-logo">Freela<span>Já</span></div>

    <h1 class="error-code">
        404
    </h1>

    <h2 class="error-title">
        Página não encontrada
    </h2>

    <p class="error-text">

        A página que você tentou acessar não existe
        ou foi removida.

    </p>

    <a href="/" class="error-btn">

        Voltar ao início

    </a>

</div>

</body>
</html>
